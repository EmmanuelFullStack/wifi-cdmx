wifi-cdmx {

  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  database {
    url      = "jdbc:postgresql://localhost:5433/wificdmx"
    url      = ${?DB_URL}
    user     = "postgres"
    user     = ${?DB_USER}
    password = "postgres"
    password = ${?DB_PASSWORD}
    driver   = "org.postgresql.Driver"
    pool {
      max-connections    = 10
      min-idle           = 2
      connection-timeout = 30000
      idle-timeout       = 600000
    }
  }
}

akka {
  loglevel = "INFO"
  http.server {
    idle-timeout    = 60s
    request-timeout = 30s
  }
}