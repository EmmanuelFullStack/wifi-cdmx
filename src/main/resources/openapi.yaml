openapi: "3.0.3"
info:
  title: WiFi CDMX API
  description: |
    API REST + GraphQL para consultar los puntos de acceso WiFi públicos
    de la Ciudad de México (datos abiertos CDMX).
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Desarrollo local

tags:
  - name: System
    description: Estado del servicio
  - name: WiFi
    description: Puntos de acceso WiFi REST
  - name: GraphQL
    description: Endpoint GraphQL unificado

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Servicio activo
          content:
            application/json:
              example: {"status":"UP","db":"UP"}
        "503":
          description: Base de datos no disponible
          content:
            application/json:
              example: {"status":"UP","db":"DOWN"}

  /api/v1/wifi:
    get:
      summary: Lista paginada de puntos WiFi
      tags: [WiFi]
      parameters:
        - {name: page,     in: query, schema: {type: integer, default: 1}}
        - {name: pageSize, in: query, schema: {type: integer, default: 20, maximum: 200}}
        - {name: alcaldia, in: query, description: Filtrar por alcaldía, schema: {type: string}}
      responses:
        "200":
          description: Página de resultados
          content:
            application/json:
              schema: {$ref: "#/components/schemas/PagedWifiResponse"}
        "400":
          description: Parámetros inválidos
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ErrorResponse"}

  /api/v1/wifi/{id}:
    get:
      summary: Obtener un punto WiFi por ID
      tags: [WiFi]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer, format: int64}}
      responses:
        "200":
          description: Punto WiFi
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WifiPoint"}
        "404":
          description: No encontrado
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ErrorResponse"}

  /api/v1/wifi/nearby:
    get:
      summary: Puntos WiFi ordenados por proximidad
      tags: [WiFi]
      parameters:
        - {name: lat,      in: query, required: true, schema: {type: number, format: double}}
        - {name: lon,      in: query, required: true, schema: {type: number, format: double}}
        - {name: page,     in: query, schema: {type: integer, default: 1}}
        - {name: pageSize, in: query, schema: {type: integer, default: 20, maximum: 200}}
      responses:
        "200":
          description: Resultados ordenados por distancia
          content:
            application/json:
              schema: {$ref: "#/components/schemas/PagedWifiResponse"}
        "400":
          description: Coordenadas inválidas
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ErrorResponse"}

  /api/v1/graphql:
    post:
      summary: Endpoint GraphQL
      tags: [GraphQL]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  example: "{ wifiPoints(page:1, pageSize:3) { total data { id alcaldia } } }"
                variables:
                  type: object
      responses:
        "200":
          description: Respuesta GraphQL
    get:
      summary: GraphiQL playground
      tags: [GraphQL]
      responses:
        "200":
          description: Interfaz GraphiQL

components:
  schemas:
    Coordinates:
      type: object
      properties:
        lat: {type: number, format: double}
        lon: {type: number, format: double}

    WifiPoint:
      type: object
      properties:
        id:               {type: integer, format: int64}
        colonia:          {type: string}
        alcaldia:         {type: string}
        calle:            {type: string}
        programa:         {type: string}
        fechaInstalacion: {type: string, format: date, nullable: true}
        coordinates:      {$ref: "#/components/schemas/Coordinates"}

    PagedWifiResponse:
      type: object
      properties:
        data:       {type: array, items: {$ref: "#/components/schemas/WifiPoint"}}
        total:      {type: integer, format: int64}
        page:       {type: integer}
        pageSize:   {type: integer}
        totalPages: {type: integer, format: int64}

    ErrorResponse:
      type: object
      properties:
        error:   {type: string}
        message: {type: string}