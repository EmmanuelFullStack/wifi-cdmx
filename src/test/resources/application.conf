# Test configuration — overrides main application.conf
# No real database needed — uses InMemoryWifiPointRepository
wifi-cdmx {
  http {
    host = "127.0.0.1"
    port = 0
  }
  database {
    url      = "jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
    user     = "sa"
    password = ""
    driver   = "org.h2.Driver"
    pool {
      max-connections    = 5
      min-idle           = 1
      connection-timeout = 5000
      idle-timeout       = 60000
    }
  }
  data {
    xlsx-url   = "http://unreachable.invalid/t.xlsx"
    local-path = "/tmp/test.xlsx"
  }
}